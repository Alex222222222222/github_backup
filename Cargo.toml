[package]
name = "github_backup"
version = "0.1.0"
edition = "2024"

[dependencies]
tokio = { version = "1.50", features = ["full"] }
reqwest = { version = "0.11", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
chrono = { version = "0.4", features = ["serde"] }
once_cell = "1.21"
object_store = { version = "0.13", features = ["fs", "aws"] }
futures-util = "0.3"
dotenv = "0.15"
log = "0.4"
env_logger = "0.11"
bytes = "1.11"
